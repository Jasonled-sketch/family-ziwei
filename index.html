<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>家庭命盤中心</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@700;900&family=LXGW+WenKai+TC&display=swap" rel="stylesheet">
<style>
/* ============ D1 基礎色字(03-design 定稿) ============ */
:root{
  --bg:#0B0918;--bg2:#120F24;--panel:#1A1633;--panel2:#221D42;--raise:#2B2452;
  --line:#332C5A;--line2:#453C78;
  --gold:#E7C57D;--gold-b:#F4DCA8;--gold-d:#C7A45B;
  --purple:#9C7CF0;--purple-d:#6B4FC0;
  --text:#EFEBFA;--muted:#A19AC8;--muted2:#78719D;
  /* 六維語意色 */
  --dim-career:#9C7CF0;--dim-wealth:#E7C57D;--dim-travel:#5FB9DD;
  --dim-friend:#E68CB4;--dim-health:#6BCB9E;--dim-ji:#E06A50;
  /* 燈號 */
  --lt-good:#6BCB9E;--lt-flat:#E7C57D;--lt-bad:#E06A50;
  --kai:'LXGW WenKai TC','Kaiti TC','DFKai-SB','BiauKai','Noto Serif TC',serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:15px;line-height:1.7;min-height:100vh}
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(1.2px 1.2px at 18% 22%,rgba(244,220,168,.5),transparent 60%),
    radial-gradient(1px 1px at 72% 12%,rgba(239,235,250,.35),transparent 60%),
    radial-gradient(1.4px 1.4px at 85% 58%,rgba(231,197,125,.4),transparent 60%),
    radial-gradient(1px 1px at 32% 78%,rgba(156,124,240,.3),transparent 60%),
    radial-gradient(1px 1px at 55% 40%,rgba(239,235,250,.22),transparent 60%),
    linear-gradient(180deg,var(--bg),var(--bg2) 60%,var(--bg))}
.wrap{max-width:480px;margin:0 auto;padding:0 16px 60px}
header.top{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  height:52px;margin:0 -16px;padding:0 16px;background:rgba(11,9,24,.86);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line)}
.brand{font-family:'Noto Serif TC',serif;font-weight:900;font-size:17px;color:var(--gold);letter-spacing:2px}
.brand .ver{font-size:10px;color:var(--muted2);margin-left:6px;letter-spacing:0}
.topdate{font-size:11.5px;color:var(--muted);text-align:right;line-height:1.4}
.eyebrow{font-size:11px;letter-spacing:.28em;color:var(--muted2);text-transform:uppercase;margin:22px 0 6px}
h2.title{font-family:'Noto Serif TC',serif;font-weight:900;font-size:22px;color:var(--text);margin:0 0 12px;letter-spacing:1px}
.card{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--line);
  border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:inset 0 1px 0 rgba(244,220,168,.06)}
.goldline{height:1px;margin:18px 0;position:relative;
  background:linear-gradient(90deg,transparent,rgba(231,197,125,.4),#F4DCA8,rgba(231,197,125,.4),transparent)}
.goldline::after{content:"◆";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  font-size:8px;color:var(--gold);background:var(--bg);padding:0 6px}
.note{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--gold-d);
  border-radius:12px;padding:10px 13px;font-size:12.5px;color:var(--muted);margin-bottom:12px}
button{font-family:inherit}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;cursor:pointer;
  border-radius:12px;padding:11px 18px;font-size:14px;font-weight:700;letter-spacing:1px}
.btn-g{background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#241a06}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line2)}
/* ---- 燈號 ---- */
.lt{display:inline-block;width:12px;height:12px;border-radius:50%;flex:none;vertical-align:middle}
.lt-綠{background:var(--lt-good);box-shadow:0 0 8px rgba(107,203,158,.6)}
.lt-黃{background:var(--lt-flat);box-shadow:0 0 7px rgba(231,197,125,.35)}
.lt-紅{background:var(--lt-bad);box-shadow:0 0 9px rgba(224,106,80,.6);animation:ltp 2s ease-in-out infinite}
@keyframes ltp{0%,100%{opacity:1}50%{opacity:.55}}
.lt.hollow{background:transparent!important;border:2px solid currentColor;animation:none}
.lt.hollow.lt-綠{color:var(--lt-good)}.lt.hollow.lt-黃{color:var(--lt-flat)}.lt.hollow.lt-紅{color:var(--lt-bad)}
@media (prefers-reduced-motion:reduce){.lt-紅{animation:none}}
/* ---- 頭像(過渡版:金環+漸層底+稱謂首字;assets/img/avatar/{id}.webp 存在時自動蓋過) ---- */
.avatar{display:inline-flex;box-sizing:border-box;border-radius:50%;flex:none;position:relative;padding:3px;
  background:conic-gradient(from 210deg,#C7A45B,#F4DCA8,#8a6f3a,#E7C57D,#C7A45B)}
.avatar .fchar{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif TC',serif;font-weight:900;color:var(--gold);
  background:radial-gradient(circle at 38% 30%,#2B2452,#171230 72%);
  text-shadow:0 0 14px rgba(231,197,125,.4);user-select:none}
.avatar img{position:absolute;inset:3px;width:calc(100% - 6px);height:calc(100% - 6px);border-radius:50%;object-fit:cover}
.av-self .fchar{background:radial-gradient(circle at 38% 30%,#3A2F57,#1B1430 72%)}
.av-spouse .fchar{background:radial-gradient(circle at 38% 30%,#3C2440,#1B1230 72%)}
.av-child .fchar{background:radial-gradient(circle at 38% 30%,#252A52,#141A38 72%)}
.av-mother .fchar{background:radial-gradient(circle at 38% 30%,#1F3345,#12203A 72%)}
.av-mother_in_law .fchar{background:radial-gradient(circle at 38% 30%,#1F3C33,#122A24 72%)}
.ring2{display:inline-block;border-radius:50%;padding:3px;
  background:conic-gradient(from 30deg,rgba(199,164,91,.65),rgba(244,220,168,.9),rgba(138,111,58,.55),rgba(231,197,125,.85),rgba(199,164,91,.65))}
/* ---- D4 家庭星系首頁 ---- */
.galaxy{position:relative;width:min(100vw - 32px,420px);aspect-ratio:1/1;margin:6px auto 0;border-radius:24px;overflow:hidden;
  background:
    url('assets/img/bg/bg-galaxy.webp') center/cover no-repeat,
    radial-gradient(1.2px 1.2px at 22% 18%,rgba(244,220,168,.55),transparent 60%),
    radial-gradient(1px 1px at 68% 10%,rgba(239,235,250,.4),transparent 60%),
    radial-gradient(1.4px 1.4px at 88% 46%,rgba(231,197,125,.45),transparent 60%),
    radial-gradient(1px 1px at 12% 62%,rgba(156,124,240,.35),transparent 60%),
    radial-gradient(1px 1px at 42% 84%,rgba(239,235,250,.3),transparent 60%),
    radial-gradient(1.2px 1.2px at 60% 55%,rgba(244,220,168,.3),transparent 60%),
    radial-gradient(circle at 50% 18%,rgba(107,79,192,.14),transparent 55%),
    linear-gradient(180deg,#0B0918,#120F24)}
.orbits{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.orbits circle{fill:none;stroke:rgba(231,197,125,.16);stroke-width:.4;stroke-dasharray:.5 1.5}
.orbits .o2{animation:orbitspin 60s linear infinite}
@keyframes orbitspin{to{stroke-dashoffset:100}}
.gmem{position:absolute;transform:translate(-50%,-50%);background:none;border:none;padding:0;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text)}
.gmem:active{opacity:.85}
.gmem .gin{position:relative;display:inline-block;animation:gfloat 4s ease-in-out infinite}
@keyframes gfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.gmem .lt{position:absolute;right:0;bottom:2px;width:14px;height:14px;border:2px solid var(--bg)}
.gname{font-size:11px;letter-spacing:1px;color:var(--text);text-shadow:0 1px 4px rgba(0,0,0,.8)}
.gflag{font-size:9px;color:var(--lt-flat)}
@media (prefers-reduced-motion:reduce){.gmem .gin{animation:none}.orbits .o2{animation:none}}
.today-strip{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;
  background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:10px 14px;margin:14px 0 0;font-size:12.5px;color:var(--muted)}
.today-strip b{color:var(--gold);font-family:'Noto Serif TC',serif}
.tchip{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--lt-bad);
  border:1px solid rgba(224,106,80,.5);border-radius:20px;padding:2px 10px;cursor:pointer;background:none}
/* ---- 個人頁(D5) ---- */
.backbar{display:flex;align-items:center;gap:8px;margin:14px 0 4px}
.backbtn{background:transparent;border:1px solid var(--line2);color:var(--muted);border-radius:10px;padding:6px 12px;font-size:12px;cursor:pointer}
.hero2{position:relative;height:200px;margin:0 -16px 14px;overflow:hidden}
.hero2 .hbg{position:absolute;inset:0;
  background:
    url('assets/img/bg/bg-galaxy.webp') center top/cover no-repeat,
    radial-gradient(1.2px 1.2px at 20% 28%,rgba(244,220,168,.5),transparent 60%),
    radial-gradient(1px 1px at 72% 16%,rgba(239,235,250,.35),transparent 60%),
    radial-gradient(1px 1px at 86% 52%,rgba(156,124,240,.3),transparent 60%),
    radial-gradient(circle at 50% 0%,rgba(107,79,192,.18),transparent 60%)}
.hero2::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,9,24,.05) 25%,var(--bg) 97%)}
.hero2 .hin{position:absolute;left:16px;right:16px;bottom:8px;display:flex;align-items:center;gap:14px;z-index:2}
.hname{font-family:'Noto Serif TC',serif;font-weight:900;font-size:26px;letter-spacing:2px}
.hsub{font-size:13px;color:var(--muted)}
/* 燙金卡(雙線框) */
.goldcard{position:relative;background:linear-gradient(165deg,var(--panel2),var(--panel));
  border:1px solid var(--gold-d);border-radius:18px;padding:18px 16px;margin-bottom:14px;
  box-shadow:inset 0 1px 0 rgba(244,220,168,.08)}
.goldcard::before{content:"";position:absolute;inset:5px;border:1px solid rgba(231,197,125,.3);border-radius:13px;pointer-events:none}
.kai17{font-family:var(--kai);font-size:17px;color:var(--gold-b);line-height:1.8}
.kai16{font-family:var(--kai);font-size:16px;color:var(--gold-b);line-height:1.8}
.mrow{font-size:12.5px;margin-top:6px}
.mrow.good{color:var(--lt-good)}
.mrow.bad{color:var(--lt-bad)}
/* 六維數值條 */
.vrows{margin-top:12px;text-align:left}
.vrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.vrow .vname{flex:none;width:34px;font-size:12px;letter-spacing:1px}
.vrow .vbar{flex:1;height:8px;background:var(--raise);border-radius:4px;overflow:hidden}
.vrow .vbar i{display:block;height:100%;border-radius:4px}
.vrow .vnum{flex:none;width:34px;text-align:right;font-family:'Noto Serif TC',serif;font-weight:700;font-size:16px;color:var(--text)}
/* D3 分享卡 */
#share-modal{position:fixed;inset:0;background:rgba(6,5,14,.88);z-index:9600;display:none;
  align-items:center;justify-content:center;padding:16px;overflow:auto}
#share-modal.show{display:flex}
.share-card{position:relative;aspect-ratio:4/5;width:min(100vw - 64px,400px);
  background:linear-gradient(170deg,#181334,#0D0A1E 70%,#0B0918);
  border:1px solid var(--gold-d);border-radius:20px;padding:20px 18px;
  display:flex;flex-direction:column;overflow:hidden}
.share-card::before{content:"";position:absolute;inset:6px;border:1px solid rgba(231,197,125,.32);border-radius:15px;pointer-events:none}
.share-card::after{content:"";position:absolute;right:-30px;bottom:-30px;width:160px;height:160px;pointer-events:none;
  background:radial-gradient(1.5px 1.5px at 30% 40%,rgba(231,197,125,.5),transparent 60%),
  radial-gradient(1px 1px at 60% 60%,rgba(244,220,168,.4),transparent 60%),
  radial-gradient(1px 1px at 45% 75%,rgba(231,197,125,.35),transparent 60%);opacity:.6}
.sc-eyebrow{font-size:10.5px;letter-spacing:.28em;color:var(--muted2);text-align:center;margin-bottom:10px}
.sc-id{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.sc-rel{font-size:12px;color:var(--muted)}
.sc-name{font-family:'Noto Serif TC',serif;font-weight:900;font-size:30px;letter-spacing:2px;line-height:1.3}
.sc-radar{flex:none;display:flex;justify-content:center;margin:2px 0}
.sc-lines{flex:1;display:flex;flex-direction:column;justify-content:center;gap:7px}
.sc-line{display:flex;gap:8px;align-items:flex-start;font-family:var(--kai);font-size:14.5px;color:var(--gold-b);line-height:1.6}
.sc-line .dot{flex:none;width:8px;height:8px;border-radius:50%;margin-top:7px}
.sc-foot{display:flex;align-items:flex-end;justify-content:space-between;margin-top:8px}
.sc-foot .d{font-size:10.5px;color:var(--muted2);letter-spacing:.15em}
.sc-seal{width:40px;height:40px;border:2px solid #E06A50;color:#E06A50;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif TC',serif;font-weight:900;font-size:20px;transform:rotate(-3deg)}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;border:1px solid var(--line2);
  color:var(--muted);border-radius:20px;padding:2px 10px;margin-right:5px}
.chip.gold{color:var(--gold);border-color:var(--gold-d)}
.banner-warn{background:rgba(231,197,125,.1);border:1px solid rgba(231,197,125,.45);color:var(--gold-b);
  border-radius:12px;padding:9px 13px;font-size:12px;margin-bottom:12px}
.banner-gray{background:rgba(161,154,200,.1);border:1px solid var(--line2);color:var(--muted);
  border-radius:12px;padding:8px 13px;font-size:11.5px;margin:10px 0}
.sum3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.sum3 .s{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 6px;text-align:center}
.sum3 .k{font-size:10px;color:var(--muted2);letter-spacing:.15em}
.sum3 .v{font-family:'Noto Serif TC',serif;font-weight:900;font-size:14px;color:var(--gold);margin-top:2px}
.layercard{margin-bottom:14px}
.layerhead{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.layerhead .t{font-family:'Noto Serif TC',serif;font-weight:900;font-size:16px;color:var(--gold)}
.layerhead .s{font-size:11px;color:var(--muted2)}
.hitline{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-top:1px dashed var(--line);font-size:13px}
.hitline:first-of-type{border-top:none}
.hitline .hua{flex:none;font-family:'Noto Serif TC',serif;font-weight:900;font-size:13px;width:34px;text-align:center;border-radius:8px;padding:1px 0}
.hua-祿{color:#6BCB9E;border:1px solid rgba(107,203,158,.4)}
.hua-權{color:#9C7CF0;border:1px solid rgba(156,124,240,.4)}
.hua-科{color:#5FB9DD;border:1px solid rgba(95,185,221,.4)}
.hua-忌{color:#E06A50;border:1px solid rgba(224,106,80,.4)}
.hitline .tx{color:var(--text)}
.hitline .src{font-size:10.5px;color:var(--muted2)}
.dimcard{border-left:3px solid var(--line2);border-radius:14px;background:var(--panel);
  padding:11px 13px;margin-bottom:9px}
.dimcard.d-事業{border-left-color:var(--dim-career)}
.dimcard.d-財運{border-left-color:var(--dim-wealth)}
.dimcard.d-外出{border-left-color:var(--dim-travel)}
.dimcard.d-朋友{border-left-color:var(--dim-friend)}
.dimcard.d-健康{border-left-color:var(--dim-health)}
.dimcard.d-嚴重忌{border-left-color:var(--dim-ji)}
.dimhead{display:flex;align-items:center;gap:8px}
.dimhead .nm{font-family:'Noto Serif TC',serif;font-weight:900;font-size:15px}
.dimhead .pl{font-size:10.5px;color:var(--muted2)}
.dimhead .sc{margin-left:auto;font-size:11px;color:var(--muted2)}
.dimtext{font-family:var(--kai);font-size:15px;color:var(--gold-b);margin-top:5px}
.dimcard.severe-red{background:rgba(224,106,80,.08);border:1px solid rgba(224,106,80,.4);border-left:3px solid var(--dim-ji)}
.capnote{font-size:11px;color:var(--muted2);margin-top:4px}
/* ---- admin panel 表單 ---- */
.frow{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px}
.frow label{flex:none;width:74px;color:var(--muted);font-size:12px}
.frow input[type=text],.frow input[type=date],.frow input[type=number],.frow select,.frow textarea{
  flex:1;background:#0E0C1A;border:1px solid var(--line2);border-radius:8px;color:var(--text);
  padding:9px 10px;font-size:13px;outline:none;font-family:inherit;min-width:0}
.frow input:focus,.frow select:focus{border-color:var(--gold)}
.seg{display:flex;gap:6px;flex:1}
.seg button{flex:1;background:#0E0C1A;border:1px solid var(--line2);color:var(--muted);border-radius:8px;padding:8px 0;font-size:12px;cursor:pointer}
.seg button.on{background:var(--raise);border-color:var(--gold-d);color:var(--gold)}
.mlist{list-style:none;padding:0;margin:10px 0}
.mlist li{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
  border-radius:10px;padding:8px 12px;margin-bottom:6px;font-size:13px}
.mlist .grow{flex:1}
.mlist button{background:var(--raise);border:1px solid var(--line2);color:var(--gold);border-radius:8px;padding:5px 12px;font-size:11.5px;cursor:pointer}
.footer{margin-top:26px;text-align:center;font-size:11px;color:var(--muted2);line-height:1.9}
.empty{text-align:center;color:var(--muted2);padding:40px 10px;font-size:13.5px}
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);opacity:0;
  background:var(--raise);border:1px solid var(--line2);color:var(--text);border-radius:12px;
  padding:10px 18px;font-size:13px;z-index:12000;transition:.25s;pointer-events:none;max-width:86vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<!-- USLED AUTH BEGIN(家庭權限版) -->
<style>
body.auth-checking > *:not(#auth-overlay):not(#updbar):not(script),
body.auth-needed   > *:not(#auth-login):not(#updbar):not(script),
body.auth-denied   > *:not(#auth-denied):not(#updbar):not(script){display:none!important}
#updbar{display:none;position:fixed;top:0;left:0;right:0;z-index:11000;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#C7A45B,#E7C57D);color:#241a06;font-weight:700;font-size:13px;padding:11px 16px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.45);font-family:'Noto Sans TC',sans-serif}
#updbar:active{filter:brightness(1.05)}
body.auth-checking #auth-overlay,
body.auth-needed   #auth-login,
body.auth-denied   #auth-denied{display:flex}
#auth-overlay,#auth-login,#auth-denied{
  position:fixed;inset:0;background:#0B0918;color:#EFEBFA;
  z-index:10000;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;padding:30px;
  font-family:'Noto Sans TC',sans-serif;
}
.auth-card{
  background:linear-gradient(160deg,#221D42,#1A1633);border:1px solid #453C78;border-radius:16px;
  padding:34px 26px;max-width:380px;width:100%;text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.5);
}
.auth-title{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:900;color:#E7C57D;letter-spacing:3px;margin-bottom:8px}
.auth-sub{font-size:13px;color:#A19AC8;margin-bottom:20px;line-height:1.8}
.auth-email{font-size:12px;color:#EFEBFA;background:#0B0918;padding:9px 12px;border-radius:8px;margin:10px 0;word-break:break-all}
.auth-btn{
  background:#fff;color:#333;border:1px solid #dadce0;border-radius:8px;
  padding:12px 18px;font-size:14px;font-weight:500;cursor:pointer;
  display:inline-flex;align-items:center;gap:10px;min-height:48px;
  font-family:'Noto Sans TC',sans-serif;
}
.auth-btn:hover{background:#f8f9fa}
.auth-btn svg{width:18px;height:18px}
.auth-btn-ghost{
  background:transparent;color:#A19AC8;border:1px solid #453C78;
  padding:9px 14px;font-size:12px;border-radius:8px;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;margin-top:8px;
}

(function(){

  };
  var ADMIN_EMAIL = 'covernself@gmail.com';

  firebase.initializeApp(firebaseConfig);
  var fbAuth = firebase.auth();
  var fbDb   = firebase.firestore();

  function setState(s){
    document.body.classList.remove('auth-checking','auth-needed','auth-denied','auth-ok');
    document.body.classList.add(s);
  }

  function clearFzKeys(){
    try{
      Object.keys(localStorage).forEach(function(k){
        if(k.indexOf('fz_')===0) localStorage.removeItem(k);
      });
    }catch(e){}
  }
  /* 授權通過 → 記 fz_auth_ok 供離線放行 */
  function grantAccess(email){
    try{localStorage.setItem('fz_auth_ok',JSON.stringify({email:email,at:Date.now()}));}catch(e){}
    setState('auth-ok');
    if(window.FZ && FZ.boot) FZ.boot();
  }
  /* 明確拒絕 → 立即清除全部 fz_*(共用瀏覽器防殘留) */
  function denyAccess(displayText){
    clearFzKeys();
    var d = document.getElementById('auth-denied-email');
    if(d) d.textContent = displayText;
    setState('auth-denied');
  }

  window.USLED_AUTH = {
    user:null,
    isAdmin:function(){
      return !!(this.user && (this.user.email||'').toLowerCase() === ADMIN_EMAIL);
    },
    /* 網路錯誤時,曾成功授權的同一 email 可離線放行 */
    _offlineAuthOk:function(email,err){
      var netErr = (err && (err.code==='unavailable' || err.code==='deadline-exceeded'))
                   || (typeof navigator!=='undefined' && navigator.onLine===false);
      if(!netErr) return false;
      var ok=null;
      try{ok=JSON.parse(localStorage.getItem('fz_auth_ok'));}catch(e){}
      return !!(ok && ok.email===email);
    },
    _deny:denyAccess,
    signIn:function(){
      var errEl = document.getElementById('auth-err');
      if(errEl) errEl.textContent='';
      var provider = new firebase.auth.GoogleAuthProvider();
      fbAuth.signInWithPopup(provider).catch(function(e){
        if(errEl) errEl.textContent='登入失敗: '+(e.code||'未知錯誤');
      });
    },
    signOut:function(){
      /* 登出清家人快取(個資防護) */
      clearFzKeys();
      fbAuth.signOut().then(function(){ location.reload(); });
    }
  };

  fbAuth.onAuthStateChanged(function(user){
    if(!user){ setState('auth-needed'); return; }
    USLED_AUTH.user = user;
    setState('auth-checking');
    var email = (user.email||'').toLowerCase();
    if(email === ADMIN_EMAIL){
      document.body.classList.add('is-admin');
      grantAccess(email);
      return;
    }
    /* 家庭權限:allowed_emails/{email}.family === true 才放行 */
    fbDb.collection('allowed_emails').doc(email).get().then(function(doc){
      if(doc.exists && doc.data().family === true){
        grantAccess(email);
      } else {
        /* 明確讀到 doc 且 family!=true,或 doc 不存在 → 拒絕 */
        denyAccess(user.email);
      }
    }).catch(function(e){
      if(USLED_AUTH._offlineAuthOk(email,e)){
        /* 離線且此帳號曾授權成功 → 放行離線模式(灰條由資料層標示) */
        setState('auth-ok');
        if(window.FZ && FZ.boot) FZ.boot();
      }else{
        denyAccess((user.email||'')+' (檢查失敗: '+((e&&e.code)||'ERR')+')');
      }
    });
  });
})();
</script>

<script>
"use strict";
/* ============================================================
   家庭命盤中心 · Phase 1(文字版)
   評分引擎=shared/score.js(ZWSCORE)、文案=shared/rules.json
   ============================================================ */
var APP_VERSION = "v0.2.0";

/* ---------- 小工具 ---------- */
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function $(q){return document.querySelector(q);}
var toastT=null;
function toast(msg){var el=$("#toast");el.textContent=msg;el.classList.add("show");clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove("show");},2200);}
function pad2(n){return (n<10?"0":"")+n;}
function ymd(d){return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}

/* ---------- 常數 ---------- */
var SHICHEN=[["早子時","00:00–00:59",0],["丑時","01:00–02:59",1],["寅時","03:00–04:59",2],["卯時","05:00–06:59",3],["辰時","07:00–08:59",4],["巳時","09:00–10:59",5],["午時","11:00–12:59",6],["未時","13:00–14:59",7],["申時","15:00–16:59",8],["酉時","17:00–18:59",9],["戌時","19:00–20:59",10],["亥時","21:00–22:59",11],["晚子時","23:00–23:59",12]];
var RELATION_ZH={self:"本人",spouse:"配偶",child:"子女",mother:"母親",mother_in_law:"岳母/婆婆"};
var MEMBER_IDS=["jason","wife","child1","child2","child3","child4","mother","mother_in_law"];
var HUA_KEYS=["lu","quan","ke","ji"];
var HUA_ZH={lu:"祿",quan:"權",ke:"科",ji:"忌"};
var PALACE_DIM={"官祿":"事業","財帛":"財運","遷移":"外出","交友":"朋友","疾厄":"健康"};
var FALLBACK_TEXT="今日此面向平順,照常安排即可。";
/* 文案層級換詞:規則庫以流日口吻撰寫,年/月層渲染時替換(日層不動) */
function adaptText(text,layer){
  var t=String(text||"");
  if(layer==="yearly")return t.replace(/今天|今日/g,"今年").replace(/今晚/g,"年內").replace(/明天/g,"之後");
  if(layer==="monthly")return t.replace(/今天|今日/g,"本月").replace(/今晚/g,"近期").replace(/明天/g,"月內");
  return t;
}
var CACHE_KEY="fz_members_cache";

/* ---------- 狀態 ---------- */
var MEMBERS=[];        /* Firestore family_members */
var OFFLINE=false;     /* 走離線快取 */
var SYNCED_AT=null;
var RULES=null;        /* shared/rules.json */
var CHARTS={};         /* memberId -> iztro astrolabe */
var DAY_MEMO={};       /* memberId|date -> computeScores 結果 */
var HORO_MEMO={};      /* memberId|date -> horoscope 摘要 */
var CAP_MEMO={};       /* memberId|YYYY-MM -> {date:{light,capped,F}} */
var VIEW_DATE=(function(){
  var m=(location.search||"").match(/[?&]d=(\d{4}-\d{2}-\d{2})/);
  if(m){var d=new Date(m[1]+"T12:00:00");if(!isNaN(d))return m[1];}
  return ymd(new Date());
})();

/* ---------- 資料層 ---------- */
function db(){return firebase.firestore();}
function saveCache(list){
  try{localStorage.setItem(CACHE_KEY,JSON.stringify({data:list,syncedAt:Date.now()}));}catch(e){}
}
function loadCache(){
  try{var o=JSON.parse(localStorage.getItem(CACHE_KEY));if(o&&o.data)return o;}catch(e){}
  return null;
}
function fetchMembers(){
  return db().collection("family_members").orderBy("order").get().then(function(snap){
    var list=[];
    snap.forEach(function(doc){var d=doc.data();d.id=doc.id;list.push(d);});
    MEMBERS=list;OFFLINE=false;SYNCED_AT=Date.now();
    saveCache(list);
  });
}
function useCacheOrFail(){
  var c=loadCache();
  if(c){MEMBERS=c.data;OFFLINE=true;SYNCED_AT=c.syncedAt;return true;}
  return false;
}
function loadRules(){
  return fetch("shared/rules.json?v="+encodeURIComponent(APP_VERSION),{cache:"no-store"})
    .then(function(r){return r.json();})
    .then(function(j){RULES=j;});
}

/* ---------- 排盤層(iztro) ---------- */
function chartOf(m){
  if(CHARTS[m.id])return CHARTS[m.id];
  if(typeof iztro==="undefined")return null;
  var g=(m.gender==="F")?"女":"男";
  var ti=(typeof m.birthHour==="number")?m.birthHour:parseInt(m.birthHour,10)||0;
  var a;
  try{
    a=(m.calendar==="lunar")
      ? iztro.astro.byLunar(m.birthDate,ti,g,!!m.isLeapMonth,true,"zh-TW")
      : iztro.astro.bySolar(m.birthDate,ti,g,true,"zh-TW");
  }catch(e){console.warn("排盤失敗",m.id,(e&&e.code)||"ERR");return null;}
  CHARTS[m.id]=a;
  return a;
}
function palacesInput(a){
  return a.palaces.map(function(p){
    return {name:p.name,stars:[].concat(p.majorStars,p.minorStars,p.adjectiveStars).map(function(s){return s.name;})};
  });
}
function horoOf(m,dateStr){
  var key=m.id+"|"+dateStr;
  if(HORO_MEMO[key])return HORO_MEMO[key];
  var a=chartOf(m);if(!a)return null;
  var h;
  try{h=a.horoscope(dateStr);}catch(e){console.warn("horoscope失敗",m.id,(e&&e.code)||"ERR");return null;}
  var o={
    decadal:{stem:h.decadal.heavenlyStem,branch:h.decadal.earthlyBranch},
    yearly:{stem:h.yearly.heavenlyStem,branch:h.yearly.earthlyBranch},
    monthly:{stem:h.monthly.heavenlyStem,branch:h.monthly.earthlyBranch},
    daily:{stem:h.daily.heavenlyStem,branch:h.daily.earthlyBranch},
    lunarDate:h.lunarDate||""
  };
  HORO_MEMO[key]=o;
  return o;
}
function scoresOf(m,dateStr){
  var key=m.id+"|"+dateStr;
  if(DAY_MEMO[key])return DAY_MEMO[key];
  var a=chartOf(m);if(!a)return null;
  var h=horoOf(m,dateStr);if(!h)return null;
  var natalStem=(a.rawDates&&a.rawDates.chineseDate&&a.rawDates.chineseDate.yearly)?a.rawDates.chineseDate.yearly[0]:null;
  var r=ZWSCORE.computeScores({
    palaces:palacesInput(a),
    stems:{natal:natalStem,decadal:h.decadal.stem,yearly:h.yearly.stem,monthly:h.monthly.stem,daily:h.daily.stem}
  });
  DAY_MEMO[key]=r;
  return r;
}
/* 日總燈=六維(含嚴重忌)最差;F 用嚴重忌 F */
var LIGHT_RANK={"綠":0,"黃":1,"紅":2};
function dayOverall(r){
  var worst="綠",F=0;
  r.dims.forEach(function(d){
    if(LIGHT_RANK[d.light]>LIGHT_RANK[worst])worst=d.light;
    if(d.dim==="嚴重忌")F=d.F;
  });
  return {light:worst,F:F};
}
/* 單人單月封頂表(防疲勞:實作在 score.js,此處組月資料) */
function monthCap(m,ymStr){
  var key=m.id+"|"+ymStr;
  if(CAP_MEMO[key])return CAP_MEMO[key];
  var parts=ymStr.split("-"),y=+parts[0],mo=+parts[1];
  var last=new Date(y,mo,0).getDate();
  var days=[];
  for(var d=1;d<=last;d++){
    var ds=y+"-"+pad2(mo)+"-"+pad2(d);
    var r=scoresOf(m,ds);
    if(!r){days.push({date:ds,light:"綠",F:0});continue;}
    var o=dayOverall(r);
    days.push({date:ds,light:o.light,F:o.F});
  }
  var capped=ZWSCORE.applyFatigueCap(days);
  var map={};
  capped.forEach(function(d){map[d.date]={light:d.light,capped:d.capped,F:d.F};});
  CAP_MEMO[key]=map;
  return map;
}
function todayLightOf(m,dateStr){
  var cap=monthCap(m,dateStr.slice(0,7));
  return cap[dateStr]||{light:"綠",capped:false,F:0};
}

/* ---------- 文案層(rules.json) ---------- */
function pickRule(dim,huaZh,seed){
  if(!RULES)return null;
  var cands=RULES.rules.filter(function(r){
    return r.dim===dim&&r.trigger.hua===huaZh&&(!r.trigger.stack||r.trigger.stack.length===0);
  });
  if(!cands.length)return null;
  return cands[seed%cands.length];
}
function severeRuleOf(stack){
  if(!RULES)return null;
  var fallback=null;
  RULES.rules.forEach(function(r){if(r.id==="嚴重忌_忌_fallback")fallback=r;});
  if(!stack)return fallback;
  var want=JSON.stringify(stack.stack);
  var exact=null,any=null;
  RULES.rules.forEach(function(r){
    if(r.dim!=="嚴重忌"||r.id==="嚴重忌_忌_fallback")return;
    if(JSON.stringify(r.trigger.stack)!==want)return;
    if(r.trigger.palace===stack.palace)exact=r;
    if(r.trigger.palace==="任一")any=r;
  });
  return exact||any||fallback;
}
/* 該層四化命中清單:[{hua,star,palace,dim,rule}](個人=命宮,文案同樣來自 rules.json) */
function layerHits(m,stem,seed){
  var out=[];
  var a=chartOf(m);if(!a||!stem)return out;
  var gh=ZWSCORE.GANHUA[stem];if(!gh)return out;
  var starPal={};
  palacesInput(a).forEach(function(p){
    var pn=ZWSCORE.normPalace(p.name);
    p.stars.forEach(function(s){starPal[s]=pn;});
  });
  HUA_KEYS.forEach(function(hk){
    var star=gh[hk],pn=starPal[star];
    if(!pn)return;
    var huaZh=HUA_ZH[hk];
    if(PALACE_DIM[pn]){
      out.push({hua:huaZh,star:star,palace:pn,dim:PALACE_DIM[pn],rule:pickRule(PALACE_DIM[pn],huaZh,seed)});
    }else if(pn==="命宮"){
      out.push({hua:huaZh,star:star,palace:pn,dim:"個人",rule:pickRule("個人",huaZh,seed)});
    }
    /* 其餘宮 v1 不顯示(田宅凶象由嚴重忌疊法承接) */
  });
  return out;
}

/* ---------- 視圖 ---------- */
function lightDot(light,hollow,size){
  return '<span class="lt lt-'+light+(hollow?' hollow':'')+'"'+(size?' style="width:'+size+'px;height:'+size+'px"':'')+'></span>';
}
/* 頭像:金環+漸層底+稱謂首字;assets/img/avatar/{id}.webp 存在時 <img> 自動蓋過(onerror 移除) */
function avatarHtml(m,px){
  px=px||56;
  var f=Math.round(px*0.42);
  var ch=(m.name||"☆").charAt(0);
  return '<span class="avatar av-'+esc(m.relation||"child")+'" style="width:'+px+'px;height:'+px+'px">'+
    '<span class="fchar" style="font-size:'+f+'px">'+esc(ch)+'</span>'+
    '<img src="assets/img/avatar/'+esc(m.id)+'.webp" alt="" onerror="this.remove()">'+
    '</span>';
}
/* D3 六維雷達 SVG(全站共用;軸序固定 12 點起順時針) */
var DIM_ORDER=["事業","財運","外出","朋友","健康","忌"];
var DIM_COLOR={"事業":"#9C7CF0","財運":"#E7C57D","外出":"#5FB9DD","朋友":"#E68CB4","健康":"#6BCB9E","忌":"#E06A50","個人":"#E7C57D"};
function radarVals(r){
  var vals={};
  r.dims.forEach(function(d){
    if(d.dim==="嚴重忌"){vals["忌"]=Math.max(0,Math.min(100,Math.round(d.F*25)));}
    else vals[d.dim]=Math.max(8,Math.min(100,Math.round(50+d.score*10)));
  });
  return vals;
}
function radarSvg(vals,size){
  size=size||280;
  var R=120,LR=140;
  function pt(k,r){var a=(-90+60*k)*Math.PI/180;return [160+r*Math.cos(a),160+r*Math.sin(a)];}
  var grid=[0.25,0.5,0.75,1].map(function(f){
    return '<circle cx="160" cy="160" r="'+(R*f)+'" fill="none" stroke="'+(f===1?"#453C78":"#332C5A")+'" stroke-width="1"/>';
  }).join("");
  var axes="",poly=[],dots="",labels="";
  DIM_ORDER.forEach(function(d,k){
    var pA=pt(k,R);
    axes+='<line x1="160" y1="160" x2="'+pA[0].toFixed(1)+'" y2="'+pA[1].toFixed(1)+'" stroke="#332C5A" stroke-width="1"/>';
    var v=Math.max(0,Math.min(100,vals[d]||0));
    var pV=pt(k,R*v/100);
    poly.push(pV[0].toFixed(1)+","+pV[1].toFixed(1));
    dots+='<circle cx="'+pV[0].toFixed(1)+'" cy="'+pV[1].toFixed(1)+'" r="3.5" fill="'+DIM_COLOR[d]+'"/>';
    var pL=pt(k,LR);
    labels+='<text x="'+pL[0].toFixed(1)+'" y="'+pL[1].toFixed(1)+'" text-anchor="middle" dominant-baseline="central" font-size="13" fill="'+DIM_COLOR[d]+'" font-family="Noto Sans TC,sans-serif">'+(d==="忌"?"忌▲":d)+'</text>';
  });
  return '<svg viewBox="0 0 320 320" width="'+size+'" height="'+size+'" role="img" aria-label="六維雷達圖">'+
    '<defs><linearGradient id="rgrad" x1="0" y1="0" x2="1" y2="1">'+
    '<stop offset="0%" stop-color="#9C7CF0" stop-opacity=".42"/>'+
    '<stop offset="100%" stop-color="#E7C57D" stop-opacity=".32"/></linearGradient></defs>'+
    grid+axes+
    '<polygon points="'+poly.join(" ")+'" fill="url(#rgrad)" stroke="#E7C57D" stroke-width="1.5"/>'+
    dots+labels+'</svg>';
}
/* 該層優先命中(忌>祿>權>科) */
var HUA_PRI={"忌":0,"祿":1,"權":2,"科":3};
function topHit(hits){
  var best=null;
  hits.forEach(function(h){if(!best||HUA_PRI[h.hua]<HUA_PRI[best.hua])best=h;});
  return best;
}

/* 3 年度燙金卡:眉標+總評楷體+關鍵詞 chip 語意色 */
function yearCardHtml(m,h,seedY){
  var hits=layerHits(m,h.yearly.stem,seedY);
  var best=topHit(hits);
  var summary=best?adaptText(best.rule?best.rule.text:FALLBACK_TEXT,"yearly"):"整體平順的一年,照自己的步調走。";

    var c=DIM_COLOR[x.dim]||"#A19AC8";
    return '<span class="chip" style="color:'+c+';border-color:'+c+'66">'+esc(x.dim)+'·化'+esc(x.hua)+'</span>';
  }).join("");
  return '<div class="goldcard"><div class="eyebrow" style="margin:0 0 8px">'+esc(String(seedY))+' 流年 · '+esc(h.yearly.stem)+esc(h.yearly.branch)+'</div>'+
    '<div class="kai17">'+esc(summary)+'</div>'+
    (chips?'<div style="margin-top:10px">'+chips+'</div>':"")+'</div>';
}
/* 4 月度卡:月+燈號+重點一句+宜/留意兩列 */
function monthCardHtml(m,h,seedM){
  var hits=layerHits(m,h.monthly.stem,seedM);
  var best=topHit(hits);
  var summary=best?adaptText(best.rule?best.rule.text:FALLBACK_TEXT,"monthly"):"本月平順,維持節奏即可。";
  var hasJi=hits.some(function(x){return x.hua==="忌";});
  var goods=hits.filter(function(x){return x.hua!=="忌";}).map(function(x){return x.dim;});
  var bads=hits.filter(function(x){return x.hua==="忌";}).map(function(x){return x.dim;});
  return '<div class="card"><div class="layerhead"><span class="t">'+parseInt(VIEW_DATE.slice(5,7),10)+' 月 </span>'+
    lightDot(hasJi?"黃":"綠")+'<span class="s">流月 '+esc(h.monthly.stem)+esc(h.monthly.branch)+'</span></div>'+
    '<div class="kai16">'+esc(summary)+'</div>'+
    (goods.length?'<div class="mrow good">宜:'+esc(goods.join("、"))+'</div>':"")+
    (bads.length?'<div class="mrow bad">留意:'+esc(bads.join("、"))+'</div>':"")+'</div>';
}

  boot:function(){
    $("#verTag").textContent=APP_VERSION;
    $("#verFoot").textContent="家庭命盤中心 "+APP_VERSION+" · 引擎 SCORE "+ZWSCORE.SCORE_VERSION;
    renderTopdate();
    loadRules().catch(function(e){console.warn("rules.json 載入失敗",(e&&e.code)||"ERR");toast("文案庫載入失敗,建議稍後重整");})
    .then(function(){
      return fetchMembers().catch(function(e){
        console.warn("Firestore 讀取失敗,改用快取",(e&&e.code)||"ERR");
        if(!useCacheOrFail()){
          $("#view").innerHTML='<div class="empty">無法連線資料庫,且沒有離線快取。<br>請檢查網路後重新整理。</div>';
          throw e;
        }
      });
    })
    .then(function(){route();})
    .catch(function(){});
    window.addEventListener("hashchange",route);
  },
  guard:function(){
    if(USLED_AUTH.isAdmin&&USLED_AUTH.isAdmin())return true;
    toast("僅管理員可執行此操作");
    return false;
  },
  openAdmin:function(){
    if(!FZ.guard())return;
    $("#admin-panel").classList.add("show");
    FZ.renderAdmin();
  },
  closeAdmin:function(){$("#admin-panel").classList.remove("show");},
  renderAdmin:function(){
    var rows=MEMBERS.map(function(m){
      return '<li><span style="font-size:16px">'+esc(m.avatar||"☆")+'</span>'+
        '<span class="grow">'+esc(m.name)+' <span style="color:#78719D;font-size:11px">'+esc(m.id)+' · 序 '+esc(m.order)+'</span></span>'+
        '<button onclick="FZ.editMember(\''+esc(m.id)+'\')">編輯</button></li>';
    }).join("")||'<li class="admin-empty">尚無成員</li>';
    var usedIds=MEMBERS.map(function(m){return m.id;});
    var freeIds=MEMBER_IDS.filter(function(x){return usedIds.indexOf(x)<0;});
    $("#admin-body").innerHTML=
      '<div class="admin-tip">成員生辰只存 Firestore,不會進到程式碼或版本庫。</div>'+
      '<ul class="mlist">'+rows+'</ul>'+
      (freeIds.length?'<button class="btn btn-g" style="width:100%" onclick="FZ.editMember(null)">＋ 新增成員</button>':'<div class="admin-tip">8 位成員已建滿。</div>')+
      '<div class="goldline"></div>'+
      '<div class="admin-head-title" style="margin-bottom:8px">家庭授權名單</div>'+
      '<div class="admin-tip">被授權的 Gmail 可登入本頁(family=true)。管理員本人免設定。</div>'+
      '<ul class="admin-list" id="fam-list"><li class="admin-empty">載入中…</li></ul>'+
      '<div class="admin-add"><input type="email" id="fam-email" placeholder="user@gmail.com" autocomplete="off"><button onclick="FZ.addFamily()">授權</button></div>'+
      '<div id="editor-slot"></div>';
    FZ.loadFamily();
  },
  loadFamily:function(){
    var ul=$("#fam-list");
    db().collection("allowed_emails").get().then(function(snap){
      var items=[];
      snap.forEach(function(doc){
        if(doc.data().family===true)items.push(doc.id);
      });
      ul.innerHTML='<li><span class="em em-admin">covernself@gmail.com(管理員)</span></li>'+
        (items.map(function(em){
          return '<li><span class="em">'+esc(em)+'</span><button class="del-btn" onclick="FZ.removeFamily(\''+esc(em)+'\')">移除</button></li>';
        }).join("")||'<li class="admin-empty">尚未授權其他家人</li>');
    }).catch(function(e){
      ul.innerHTML='<li class="admin-empty" style="color:#E06A50">讀取失敗:'+esc((e&&e.code)||"ERR")+'</li>';
    });
  },
  addFamily:function(){
    if(!FZ.guard())return;
    var input=$("#fam-email");
    var email=(input.value||"").trim().toLowerCase();
    if(!email||email.indexOf("@")<0){toast("請輸入有效 email");return;}
    /* merge:true — 不覆蓋 ziwei-learn 既有授權欄位 */
    db().collection("allowed_emails").doc(email).set({
      family:true,
      familyAddedAt:firebase.firestore.FieldValue.serverTimestamp(),
      familyAddedBy:(USLED_AUTH.user&&USLED_AUTH.user.email)||"unknown"
    },{merge:true}).then(function(){input.value="";toast("已授權");FZ.loadFamily();})
    .catch(function(e){toast("授權失敗:"+((e&&e.code)||"ERR"));});
  },
  removeFamily:function(email){
    if(!FZ.guard())return;
    if(!confirm("移除 "+email+" 的家庭授權?(不影響其在其他工具的授權)"))return;
    db().collection("allowed_emails").doc(email).set({family:false},{merge:true})
      .then(function(){toast("已移除");FZ.loadFamily();})
      .catch(function(e){toast("移除失敗:"+((e&&e.code)||"ERR"));});
  },
  editMember:function(id){
    if(!FZ.guard())return;
    var m=null;
    MEMBERS.forEach(function(x){if(x.id===id)m=x;});
    var isNew=!m;
    m=m||{id:"",name:"",relation:"child",gender:"M",calendar:"solar",birthDate:"",isLeapMonth:false,birthHour:0,hourConfidence:"exact",avatar:"",notes:"",order:MEMBERS.length+1};
    var usedIds=MEMBERS.map(function(x){return x.id;});
    var idOpts=MEMBER_IDS.filter(function(x){return isNew?usedIds.indexOf(x)<0:x===m.id;})
      .map(function(x){return '<option value="'+x+'"'+(x===m.id?" selected":"")+'>'+x+'</option>';}).join("");
    var relOpts=Object.keys(RELATION_ZH).map(function(k){
      return '<option value="'+k+'"'+(k===m.relation?" selected":"")+'>'+RELATION_ZH[k]+'</option>';}).join("");
    var hourOpts=SHICHEN.map(function(t){
      return '<option value="'+t[2]+'"'+(String(t[2])===String(m.birthHour)?" selected":"")+'>'+t[0]+'('+t[1]+')</option>';}).join("");
    $("#editor-slot").innerHTML=
      '<div class="goldline"></div>'+
      '<div class="admin-head-title" style="margin-bottom:10px">'+(isNew?"新增成員":"編輯:"+esc(m.name))+'</div>'+
      '<div class="frow"><label>代號</label><select id="f-id"'+(isNew?"":" disabled")+'>'+idOpts+'</select></div>'+
      '<div class="frow"><label>顯示名</label><input type="text" id="f-name" value="'+esc(m.name)+'" placeholder="可用稱謂,如:爸爸"></div>'+
      '<div class="frow"><label>關係</label><select id="f-rel">'+relOpts+'</select></div>'+
      '<div class="frow"><label>性別</label><div class="seg"><button id="f-gm" class="'+(m.gender!=="F"?"on":"")+'" onclick="FZ.segG(this,\'M\')">男</button><button id="f-gf" class="'+(m.gender==="F"?"on":"")+'" onclick="FZ.segG(this,\'F\')">女</button></div></div>'+
      '<div class="frow"><label>曆別</label><div class="seg"><button id="f-cs" class="'+(m.calendar!=="lunar"?"on":"")+'" onclick="FZ.segC(this,\'solar\')">國曆</button><button id="f-cl" class="'+(m.calendar==="lunar"?"on":"")+'" onclick="FZ.segC(this,\'lunar\')">農曆</button></div></div>'+
      '<div class="frow" id="f-leaprow" style="display:'+(m.calendar==="lunar"?"flex":"none")+'"><label>閏月</label><label style="width:auto;color:var(--text)"><input type="checkbox" id="f-leap"'+(m.isLeapMonth?" checked":"")+'> 是閏月</label></div>'+
      '<div class="frow"><label>出生日期</label><input type="date" id="f-date" value="'+esc(m.birthDate)+'"></div>'+
      '<div class="frow"><label>時辰</label><select id="f-hour">'+hourOpts+'</select></div>'+
      '<div class="frow"><label>時辰把握</label><select id="f-hc">'+
        '<option value="exact"'+(m.hourConfidence==="exact"?" selected":"")+'>確定</option>'+
        '<option value="approx"'+(m.hourConfidence==="approx"?" selected":"")+'>大約</option>'+
        '<option value="unknown"'+(m.hourConfidence==="unknown"?" selected":"")+'>不確定</option></select></div>'+
      '<div class="frow"><label>頭像 emoji</label><input type="text" id="f-avatar" value="'+esc(m.avatar)+'" placeholder="如 🦁(禁真人照片)" maxlength="4"></div>'+
      '<div class="frow"><label>排序 1-8</label><input type="number" id="f-order" value="'+esc(m.order)+'" min="1" max="8"></div>'+
      '<div class="frow"><label>備註</label><input type="text" id="f-notes" value="'+esc(m.notes||"")+'"></div>'+
      '<div style="display:flex;gap:8px;margin-top:14px">'+
      '<button class="btn btn-g" style="flex:1" onclick="FZ.saveMember('+(isNew?"true":"false")+')">儲存</button>'+
      '<button class="btn btn-ghost" onclick="document.getElementById(\'editor-slot\').innerHTML=\'\'">取消</button></div>';
    var slot=$("#editor-slot");if(slot.scrollIntoView)slot.scrollIntoView({behavior:"smooth",block:"start"});
  },
  segG:function(b,v){$("#f-gm").classList.toggle("on",v==="M");$("#f-gf").classList.toggle("on",v==="F");b.dataset.v=v;FZ._g=v;},
  segC:function(b,v){$("#f-cs").classList.toggle("on",v==="solar");$("#f-cl").classList.toggle("on",v==="lunar");FZ._c=v;$("#f-leaprow").style.display=(v==="lunar")?"flex":"none";},
  _g:null,_c:null,
  saveMember:function(isNew){
    if(!FZ.guard())return;
    var id=$("#f-id").value;
    var name=($("#f-name").value||"").trim();
    var birthDate=$("#f-date").value;
    if(!id){toast("請選代號");return;}
    if(!name){toast("請填顯示名");return;}
    if(!/^\d{4}-\d{2}-\d{2}$/.test(birthDate)){toast("請填出生日期");return;}
    var gender=FZ._g||($("#f-gf").classList.contains("on")?"F":"M");
    var calendar=FZ._c||($("#f-cl").classList.contains("on")?"lunar":"solar");
    var doc={
      name:name,
      relation:$("#f-rel").value,
      gender:gender,
      calendar:calendar,
      birthDate:birthDate,
      isLeapMonth:(calendar==="lunar")&&$("#f-leap")&&$("#f-leap").checked||false,
      birthHour:parseInt($("#f-hour").value,10)||0,
      hourConfidence:$("#f-hc").value,
      avatar:($("#f-avatar").value||"").trim(),
      notes:($("#f-notes").value||"").trim(),
      order:Math.min(8,Math.max(1,parseInt($("#f-order").value,10)||1)),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
      updatedBy:(USLED_AUTH.user&&USLED_AUTH.user.email)||"unknown"
    };
    db().collection("family_members").doc(id).set(doc,{merge:true}).then(function(){
      toast("已儲存");
      FZ._g=null;FZ._c=null;
      CHARTS={};DAY_MEMO={};HORO_MEMO={};CAP_MEMO={};
      return fetchMembers();
    }).then(function(){FZ.renderAdmin();route();})
    .catch(function(e){toast("儲存失敗:"+((e&&e.code)||"ERR"));});
  }
};
window.FZ=FZ;

/* ---------- 版本列 + 自動更新提示(照 ziwei-learn 慣例) ---------- */
(function(){var v=document.getElementById("verTag");if(v)v.textContent=APP_VERSION;})();
(function(){
 function chk(){
  fetch("version.json?t="+(new Date().getTime()),{cache:"no-store"})
   .then(function(r){return r.json();})
   .then(function(j){
     if(j&&j.version&&j.version!==APP_VERSION){
       var b=document.getElementById("updbar");if(!b)return;
       b.querySelector("span").textContent="🔄 有新版本 "+j.version+"(目前 "+APP_VERSION+")· 點我更新";
       b.style.display="flex";
       b.onclick=function(){location.reload();};
     }
   }).catch(function(){});
 }
 chk();setInterval(chk,10*60*1000);
})();
</script>
</body>
</html>
